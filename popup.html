<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSES Problem Tracker</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <i class="fas fa-trophy"></i>
            <h1>CSES Tracker</h1>
        </div>
        
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="solved-count">-</div>
                <div class="stat-label">Problems Solved</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-number" id="total-problems">1700+</div>
                <div class="stat-label">Total Problems</div>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress-label">
                <span>Progress</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        
        <div class="chart-section" id="chart-section" style="display: none;">
            <div class="chart-header">
                <h3>Problem Categories</h3>
                <button id="toggle-chart" class="btn-small">Hide Chart</button>
            </div>
            <div class="chart-container">
                <canvas id="progress-chart" width="280" height="200"></canvas>
            </div>
        </div>
        
        <div class="info-section">
            <div class="info-item">
                <i class="fas fa-clock"></i>
                <span id="last-updated">Never</span>
            </div>
            <div class="info-item">
                <i class="fas fa-link"></i>
                <span>cses.fi/problemset</span>
            </div>
            <div class="info-item">
                <i class="fas fa-palette"></i>
                <span>Modern styling available</span>
            </div>
            <div class="info-item">
                <i class="fas fa-code"></i>
                <span>LeetCode suggestions added</span>
            </div>
        </div>
        
        <div class="actions">
            <button id="refresh-btn" class="btn primary">
                <i class="fas fa-sync-alt"></i>
                Refresh
            </button>
            <button id="visit-site-btn" class="btn secondary">
                <i class="fas fa-external-link-alt"></i>
                Visit CSES
            </button>
        </div>
        
        <div class="footer">
            <small>Track your CSES problem solving progress</small>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
