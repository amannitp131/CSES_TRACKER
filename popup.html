<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSES Problem Tracker</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Hidden SVG defs for ring gradient -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#22c55e" />
                <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
        </defs>
    </svg>

    <div class="popup">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="trophy-icon">🏆</span>
                <div>
                    <div class="header-title">CSES Tracker</div>
                    <div class="header-sub">cses.fi/problemset</div>
                </div>
            </div>
            <div class="header-badge" id="status-badge">Loading…</div>
        </div>

        <!-- Hero: ring + quick stats -->
        <div class="hero">
            <div class="ring-wrap">
                <svg class="ring-svg" viewBox="0 0 120 120" width="110" height="110">
                    <circle class="ring-bg" cx="60" cy="60" r="50" />
                    <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
                            stroke="url(#ringGrad)" />
                </svg>
                <div class="ring-center">
                    <div class="ring-number" id="solved-count">—</div>
                    <div class="ring-label">solved</div>
                </div>
            </div>

            <div class="hero-stats">
                <div class="hstat">
                    <div class="hstat-val" id="total-problems">300</div>
                    <div class="hstat-lbl">Total</div>
                </div>
                <div class="hstat accent">
                    <div class="hstat-val" id="progress-pct">0%</div>
                    <div class="hstat-lbl">Progress</div>
                </div>
                <div class="hstat">
                    <div class="hstat-val" id="last-updated">—</div>
                    <div class="hstat-lbl">Updated</div>
                </div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="pbar-row">
            <div class="pbar-track">
                <div class="pbar-fill" id="pbar-fill"></div>
            </div>
        </div>

        <!-- Category breakdown -->
        <div class="section-hdr">
            <span>Category Progress</span>
            <button class="toggle-btn" id="toggle-cats">Hide</button>
        </div>

        <div class="cats-panel" id="cats-panel">
            <div class="cats-empty" id="cats-empty">
                Visit <strong>cses.fi/problemset/list</strong> once to load categories
            </div>
            <div id="cat-list"></div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button id="refresh-btn" class="btn btn-primary">
                <span id="refresh-icon" class="btn-ico">↻</span>
                Refresh
            </button>
            <button id="visit-site-btn" class="btn btn-secondary">
                <span class="btn-ico">↗</span>
                Visit CSES
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            Track your competitive programming journey
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
