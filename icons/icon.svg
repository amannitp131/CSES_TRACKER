<!-- Simple SVG icon that can be converted to PNG -->
<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45a049;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" stroke="#2e7d32" stroke-width="2"/>
  
  <!-- Trophy icon -->
  <path d="M64 20 L50 35 L50 45 L78 45 L78 35 Z" fill="#FFD700"/>
  <rect x="58" y="45" width="12" height="25" fill="#FFD700"/>
  <rect x="52" y="70" width="24" height="8" fill="#FFD700"/>
  <rect x="55" y="78" width="18" height="4" fill="#FFD700"/>
  
  <!-- Checkmark -->
  <path d="M45 55 L55 65 L75 45" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Text background -->
  <rect x="20" y="85" width="88" height="20" fill="rgba(255,255,255,0.9)" rx="10"/>
  
  <!-- CSES text -->
  <text x="64" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">CSES</text>
</svg>
